<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>野球ゲーム - CPU参戦版</title>
    <style>
        body { text-align: center; font-family: 'Hiragino Kaku Gothic ProN', sans-serif; background-color: #f0f0f0; }
        #game-container {
            position: relative;
            width: 400px;
            height: 500px;
            background-color: #2e8b57;
            margin: 20px auto;
            border: 10px solid #5d4037;
            border-radius: 10px;
            overflow: hidden;
        }
        #ball {
            position: absolute;
            top: 80px;
            left: 190px;
            width: 20px;
            height: 20px;
            background-color: white;
            border-radius: 50%;
            display: none;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }
        #bat {
            position: absolute;
            bottom: 50px;
            left: 150px;
            width: 100px;
            height: 12px;
            background-color: #deb887;
            display: none;
            transform-origin: center;
        }
        #home-plate {
            position: absolute;
            bottom: 45px;
            left: 180px;
            width: 40px;
            height: 20px;
            background-color: #fff;
            clip-path: polygon(0% 0%, 100% 0%, 100% 50%, 50% 100%, 0% 50%);
        }
        .controls { margin-top: 20px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; border-radius: 5px; border: none; background: #333; color: white; }
        button:disabled { background: #ccc; }
        #message { font-size: 28px; font-weight: bold; color: #d32f2f; height: 40px; margin-bottom: 10px; }
        .status { margin-bottom: 10px; font-size: 18px; }
    </style>
</head>
<body>

    <h1>CPU vs CPU / Player</h1>
    <div id="message">READY?</div>
    <div class="status">Mode: <span id="mode-text">Manual</span></div>
    
    <div id="game-container">
        <div id="ball"></div>
        <div id="home-plate"></div>
        <div id="bat"></div>
    </div>

    <div class="controls">
        <button id="pitch-btn" onclick="pitchBall()">投げる (Pitch)</button>
        <button id="swing-btn" onclick="swingBat()" disabled>打つ (Swing)</button>
        <button id="cpu-btn" onclick="toggleCPU()">CPU自動打撃: OFF</button>
    </div>

    <script>
        const ball = document.getElementById('ball');
        const bat = document.getElementById('bat');
        const message = document.getElementById('message');
        const pitchBtn = document.getElementById('pitch-btn');
        const swingBtn = document.getElementById('swing-btn');
        const cpuBtn = document.getElementById('cpu-btn');
        const modeText = document.getElementById('mode-text');

        let ballPos = 80;
        let pitchInterval;
        let isPitched = false;
        let cpuEnabled = false;
        let cpuTargetPos = 440; // CPUが狙う高さ

        // CPUモードの切り替え
        function toggleCPU() {
            cpuEnabled = !cpuEnabled;
            cpuBtn.innerText = "CPU自動打撃: " + (cpuEnabled ? "ON" : "OFF");
            modeText.innerText = cpuEnabled ? "Auto (CPU)" : "Manual";
            cpuBtn.style.background = cpuEnabled ? "#4CAF50" : "#333";
        }

        function pitchBall() {
            if (isPitched) return;
            
            isPitched = true;
            ballPos = 80;
            ball.style.top = ballPos + 'px';
            ball.style.display = 'block';
            message.innerText = "PLAY BALL!";
            pitchBtn.disabled = true;
            swingBtn.disabled = cpuEnabled; // CPU時はボタン無効

            // 投球スピード（ランダム性を持たせるとよりゲームらしくなります）
            const speed = 5 + Math.random() * 3;

            pitchInterval = setInterval(() => {
                ballPos += speed;
                ball.style.top = ballPos + 'px';

                // CPUのロジック: ターゲット位置に来たら自動で振る
                if (cpuEnabled && ballPos >= cpuTargetPos - 5 && ballPos <= cpuTargetPos + 5) {
                    swingBat();
                }

                if (ballPos > 500) {
                    endGame("STRIKE!");
                }
            }, 20);
        }

        function swingBat() {
            if (!isPitched) return;

            bat.style.display = 'block';
            // 振った瞬間の判定
            const hitZone = 440;
            const diff = Math.abs(ballPos - hitZone);

            setTimeout(() => {
                bat.style.display = 'none';
                if (diff < 15) {
                    endGame("⚾ HOME RUN!! ⚾");
                } else if (diff < 40) {
                    endGame("HIT!");
                } else {
                    // 振り遅れ・早すぎはスルー（ballPosが500を超えるまで続く）
                }
            }, 100);
        }

        function endGame(result) {
            clearInterval(pitchInterval);
            message.innerText = result;
            ball.style.display = 'none';
            isPitched = false;
            pitchBtn.disabled = false;
            swingBtn.disabled = true;
        }
    </script>
</body>
</html>
