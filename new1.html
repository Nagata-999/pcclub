<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>プロ野球ミニ - 1イニング対戦（修正版）</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --y-r: #EF3E42; --grass: #228B22; --soil: #8B4513; }
        body { text-align: center; font-family: sans-serif; background: #1a1a1a; color: white; margin: 0; padding: 0; overflow: hidden; }
        
        #sb { background: #003300; width: 340px; margin: 10px auto 0; padding: 10px 5px; font-size: 14px; border: 2px solid #555; border-radius: 10px; }
        .flex { display: flex; justify-content: space-around; align-items: center; }
        .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; border: 1px solid #777; margin: 0 2px; }
        .b-on { background: #ffff00; } .s-on { background: #ffaa00; } .o-on { background: #ff0000; }
        .runner { width: 12px; height: 12px; border: 1px solid #fff; transform: rotate(45deg); margin: 2px; }
        .r-on { background: #ffff00; }

        #stadium {
            position: relative; width: 320px; height: 380px; background: var(--grass);
            margin: 10px auto; border: 4px solid #ccc; border-radius: 20px; overflow: hidden; z-index: 1; cursor: pointer;
        }
        #infield { position: absolute; bottom: -60px; left: 35px; width: 250px; height: 250px; background: var(--soil); border-radius: 50%; transform: rotate(45deg); border: 2px solid #fff; pointer-events: none; }
        #ball { position: absolute; width: 11px; height: 11px; background: white; border-radius: 50%; display: none; z-index: 5; }
        #bat { 
            position: absolute; bottom: 40px; left: 80px; width: 120px; height: 120px;
            background-image: url('images/bat.png'); background-size: contain; background-repeat: no-repeat;
            display: none; transform-origin: 20% 80%; z-index: 10; pointer-events: none;
        }
        
        #msg { position: absolute; top: 25%; width: 100%; text-align: center; font-size: 24px; font-weight: bold; color: #ffff00; text-shadow: 2px 2px #000; z-index: 20; pointer-events: none; }
        .btn-container { margin: 10px; height: 50px; }
        #action-btn { padding: 12px 30px; font-size: 18px; font-weight: bold; cursor: pointer; background: var(--y-r); color: #fff; border: 2px solid #fff; border-radius: 50px; }
    </style>
</head>
<body>

    <div id="sb">
        <div class="flex">
            <div>あなた <b id="sc-y" style="font-size:20px">0</b></div>
            <div id="inning-text" style="font-size:12px; color:#0f0">待機中</div>
            <div><b id="sc-h" style="font-size:20px">0</b> CPU</div>
        </div>
        <hr style="border:0; border-top:1px solid #444">
        <div class="flex">
            <div style="text-align:left">
                B<span id="b1" class="dot"></span><span id="b2" class="dot"></span><span id="b3" class="dot"></span><br>
                S<span id="s1" class="dot"></span><span id="s2" class="dot"></span><br>
                O<span id="o1" class="dot"></span><span id="o2" class="dot"></span>
            </div>
            <div class="flex" style="flex-direction: column;">
                <div id="r2" class="runner"></div>
                <div class="flex">
                    <div id="r3" class="runner"></div>
                    <div id="r1" class="runner"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="stadium" onmousedown="handleInput()">
        <div id="msg">「試合開始」を押してね</div>
        <div id="infield"></div>
        <div id="ball"></div>
        <div id="bat"></div>
    </div>

    <div class="btn-container">
        <button id="action-btn" onclick="gameControl()">試合開始！</button>
    </div>

        let swingStartTime = 0;
