<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ネオン・ナイト・レーサー (スマホ＆激甘判定版)</title>
    <style>
        body {
            margin: 0;
            background: #0d0d1a;
            font-family: 'Impact', 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: white;
            /* スマホでの誤動作（長押しメニューやダブルタップズーム）を防止 */
            touch-action: none;
            -webkit-touch-callout: none;
            user-select: none;
        }
        #gameContainer {
            text-align: center;
            position: relative;
        }
        #ui {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 400px;
            margin-bottom: 10px;
            box-sizing: border-box;
            padding: 0 10px;
        }
        .info-box {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
        }
        #score { color: #00ffcc; text-shadow: 0 0 10px rgba(0,255,204,0.5); }
        #level { color: #ff007f; text-shadow: 0 0 10px rgba(255,0,127,0.5); }
        canvas {
            background: #121225;
            display: block;
            border: 4px solid #00ffcc;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.3);
            border-radius: 8px;
            max-width: 100vw;
            max-height: 75vh;
        }
        /* スマホ用操作ガイド（うっすら表示） */
        #touchGuide {
            display: flex;
            justify-content: space-between;
            width: 400px;
            margin-top: 8px;
            font-size: 12px;
            color: #555;
        }
        @media (max-width: 450px) {
            #touchGuide { width: 100%; padding: 0 20px; box-sizing: border-box; }
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <div id="ui">
        <div class="info-box" id="score">SCORE: <span id="scoreValue">0</span></div>
        <div class="info-box" id="level">STAGE: <span id="levelValue">1</span></div>
    </div>
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <div id="touchGuide">
        <span>← 画面の左側をタッチで左移動</span>
        <span>画面の右側をタッチで右移動 →</span>
    </div>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const scoreValue = document.getElementById("scoreValue");
const levelValue = document.getElementById("levelValue");

let score = 0;
let currentLevel = 1;
let gameOver = false;

// 自機画像の読み込み
const playerImage = new Image();
playerImage.src = "./e2e5ca25942d036f6baacae2192b769f-removebg-preview.png";

// プレイヤー（自車）のパラメータ
const player = {
    x: 175,
    y: 490,
    width: 50,  
    height: 85, 
    speed: 12
};

// ゲームスピード調整用
let baseSpeed = 7; 
let obstacleSpeed = baseSpeed;
const spawnRate = 28;     
let frameCount = 0;

let obstacles = [];
let coins = [];

let lineOffset = 0;
const keys = {};
let isTouchingLeft = false;
let isTouchingRight = false;

// キーボード入力
window.addEventListener("keydown", (e) => {
    keys[e.key] = true;
    if (gameOver && e.key === " ") {
        resetGame();
    }
});
window.addEventListener("keyup", (e) => {
    keys[e.key] = false;
});

// スマホ用タッチイベント（マルチタッチ対応）
canvas.addEventListener("touchstart", (e) => {
    e.preventDefault();
    if (gameOver) {
        resetGame();
        return;
    }
    handleTouches(e.touches);
}, { passive: false });

canvas.addEventListener("touchmove", (e) => {
    e.preventDefault();
    handleTouches(e.touches);
}, { passive: false });

canvas.addEventListener("touchend", (e) => {
    e.preventDefault();
    handleTouches(e.touches);
}, { passive: false });

function handleTouches(touches) {
    isTouchingLeft = false;
    isTouchingRight = false;
    
    // キャンバスの実際の表示サイズを取得してタッチ位置を計算
    const rect = canvas.getBoundingClientRect();
    
    for (let i = 0; i < touches.length; i++) {
        const touchX = touches[i].clientX - rect.left;
        const relativeX = touchX * (canvas.width / rect.width); // 画面サイズに変換
        
        if (relativeX < canvas.width / 2) {
            isTouchingLeft = true;
        } else {
            isTouchingRight = true;
        }
    }
}

// 【超・激甘】当たり判定の計算
function checkCollision(rect1, rect2) {
    // プレイヤーの当たり判定：さらに極限まで小さく（ほぼ中心のコアだけ）
    const paddingX = 14;  // 左右を14pxずつ削る（横幅50px中、わずか22pxしか判定がない）
    const paddingY = 22;  // 上下を22pxずつ削る

    const pHitbox = {
        x: rect1.x + paddingX,
        y: rect1.y + paddingY,
        width: rect1.width - (paddingX * 2),
        height: rect1.height - (paddingY * 2)
    };

    // 敵の当たり判定：こちらも一回り小さく設定
    const enemyPaddingX = 10;
    const enemyPaddingY = 15;
    const eHitbox = {
        x: rect2.x + enemyPaddingX,
        y: rect2.y + enemyPaddingY,
        width: rect2.width - (enemyPaddingX * 2),
        height: rect2.height - (enemyPaddingY * 2)
    };

    return pHitbox.x < eHitbox.x + eHitbox.width &&
           pHitbox.x + pHitbox.width > eHitbox.x &&
           pHitbox.y < eHitbox.y + eHitbox.height &&
           pHitbox.y + pHitbox.height > eHitbox.y;
}

function resetGame() {
    score = 0;
    currentLevel = 1;
    obstacleSpeed = baseSpeed;
    gameOver = false;
    player.x = 175;
    player.y = 490;
    obstacles = [];
    coins = [];
    frameCount = 0;
    lineOffset = 0;
    isTouchingLeft = false;
    isTouchingRight = false;
    scoreValue.textContent = score;
    levelValue.textContent = currentLevel;
    animate();
}

function animate() {
    if (gameOver) {
        ctx.fillStyle = "rgba(10, 10, 30, 0.9)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = "#ff0055";
        ctx.font = "bold 45px Arial";
        ctx.textAlign = "center";
        ctx.shadowColor = "#ff0055";
        ctx.shadowBlur = 15;
        ctx.fillText("GAME OVER", canvas.width / 2, 260);
        
        ctx.fillStyle = "#ffffff";
        ctx.font = "20px Arial";
        ctx.shadowBlur = 0;
        ctx.fillText("SCORE: " + score, canvas.width / 2, 320);
        ctx.fillText("画面タップ または", canvas.width / 2, 380);
        ctx.fillText("スペースキーで再起動", canvas.width / 2, 410);
        return;
    }

    requestAnimationFrame(animate);
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    currentLevel = Math.floor(score / 150) + 1;
    levelValue.textContent = currentLevel;
    obstacleSpeed = baseSpeed + (currentLevel * 1.2);

    lineOffset += obstacleSpeed;
    if (lineOffset >= 50) lineOffset = 0;

    ctx.strokeStyle = "#1f1f3d";
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(133, 0); ctx.lineTo(133, canvas.height); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(266, 0); ctx.lineTo(266, canvas.height); ctx.stroke();

    ctx.strokeStyle = "#00ffcc";
    ctx.lineWidth = 4;
    ctx.shadowColor = "#00ffcc";
    ctx.shadowBlur = 8;
    ctx.setLineDash([30, 20]);
    ctx.beginPath();
    ctx.moveTo(200, -50 + lineOffset);
    ctx.lineTo(200, canvas.height + 50 + lineOffset);
    ctx.stroke();
    ctx.shadowBlur = 0;

    // プレイヤー移動処理（キーボード ＆ スマホタッチの両方に対応）
    if ((keys["ArrowLeft"] || keys["a"] || isTouchingLeft) && player.x > 8) {
        player.x -= player.speed;
    }
    if ((keys["ArrowRight"] || keys["d"] || isTouchingRight) && player.x < canvas.width - player.width - 8) {
        player.x += player.speed;
    }

    // 自機の描画
    ctx.shadowColor = "#00ffff";
    ctx.shadowBlur = 12;
    if (playerImage.complete) {
        ctx.drawImage(playerImage, player.x, player.y, player.width, player.height);
    } else {
        ctx.fillStyle = "#ff0055";
        ctx.fillRect(player.x, player.y, player.width, player.height);
    }
    ctx.shadowBlur = 0;

    const lanes = [41, 175, 309];

    frameCount++;
    if (frameCount % spawnRate === 0) {
        const width = 50;
        const height = 90;
        const primaryIndex = Math.floor(Math.random() * lanes.length);
        const colors = ["#00ffff", "#ffcc00", "#00ff66", "#9933ff"];

        obstacles.push({ 
            x: lanes[primaryIndex], y: -height, width, height, 
            color: colors[Math.floor(Math.random() * colors.length)],
            seed: Math.random() * 100
        });

        const remainingIndices = [0, 1, 2].filter(idx => idx !== primaryIndex);
        const secondChoice = remainingIndices[Math.floor(Math.random() * remainingIndices.length)];
        
        if (Math.random() < 0.4) { 
            obstacles.push({ 
                x: lanes[secondChoice], y: -height - 60, width, height, 
                color: colors[Math.floor(Math.random() * colors.length)],
                seed: Math.random() * 100
            });
        } else if (Math.random() < 0.5) { 
            const coinLane = remainingIndices[Math.floor(Math.random() * remainingIndices.length)];
            coins.push({ x: lanes[coinLane] + 15, y: -30, size: 20 });
        }
    }

    // コイン処理（獲得判定は当たりやすさを維持）
    for (let i = coins.length - 1; i >= 0; i--) {
        coins[i].y += obstacleSpeed;

        ctx.fillStyle = "#ffcc00";
        ctx.shadowColor = "#ffcc00";
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.arc(coins[i].x + 10, coins[i].y + 10, coins[i].size / 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;

        const coinRect = { x: coins[i].x, y: coins[i].y, width: coins[i].size, height: coins[i].size };
        if (checkCollision(player, coinRect) || (player.x < coins[i].x + 20 && player.x + player.width > coins[i].x && player.y < coins[i].y + 20 && player.y + player.height > coins[i].y)) {
            coins.splice(i, 1);
            score += 50;
            scoreValue.textContent = score;
            continue;
        }
        if (coins[i].y > canvas.height) coins.splice(i, 1);
    }

    // 敵車処理
    for (let i = obstacles.length - 1; i >= 0; i--) {
        obstacles[i].y += obstacleSpeed;
        obstacles[i].x += Math.sin((obstacles[i].y / 30) + obstacles[i].seed) * 2.5;

        if (obstacles[i].x < 5) obstacles[i].x = 5;
        if (obstacles[i].x > canvas.width - obstacles[i].width - 5) obstacles[i].x = canvas.width - obstacles[i].width - 5;

        ctx.fillStyle = obstacles[i].color;
        ctx.fillRect(obstacles[i].x, obstacles[i].y, obstacles[i].width, obstacles[i].height);
        
        ctx.fillStyle = "#ff0000";
        ctx.fillRect(obstacles[i].x + 5, obstacles[i].y + obstacles[i].height - 7, 10, 7);
        ctx.fillRect(obstacles[i].x + obstacles[i].width - 15, obstacles[i].y + obstacles[i].height - 7, 10, 7);

        if (checkCollision(player, obstacles[i])) {
            gameOver = true;
        }

        if (obstacles[i].y > canvas.height) {
            obstacles.splice(i, 1);
            score += 10;
            scoreValue.textContent = score;
        }
    }
}

resetGame();
</script>

</body>
</html>
